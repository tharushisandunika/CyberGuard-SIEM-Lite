<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberGuard SIEM Lite – Authentication Console</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 px-3">

    <!-- LOGIN PANEL -->
    <div id="login-container" class="card glass-panel p-4 w-100" style="max-width: 400px;">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock text-info fs-1"></i>
            <h3 class="cyber-title font-cyber mt-2">CYBERGUARD SIEM</h3>
            <p class="text-muted small">Security Information & Event Manager</p>
        </div>

        <div id="login-error" class="alert alert-danger py-2 border-danger bg-opacity-10 text-danger d-none" role="alert" style="font-size: 0.85rem;">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> <span id="login-error-msg"></span>
        </div>

        <form id="login-form">
            <div class="mb-3">
                <label class="form-label text-muted small text-uppercase font-cyber">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-person"></i></span>
                    <input type="text" id="login-username" class="form-control form-cyber" placeholder="Enter username" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label text-muted small text-uppercase font-cyber">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-key"></i></span>
                    <input type="password" id="login-password" class="form-control form-cyber" placeholder="Enter password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-cyber-primary w-100 py-2 font-cyber mb-3">
                Access Console
            </button>
        </form>

        <div class="text-center mt-2">
            <span class="text-muted small">Need credentials? </span>
            <a href="#" id="link-show-register" class="text-info small text-decoration-none">
                Register Analyst Account
            </a>
        </div>

        <div class="mt-4 pt-3 border-top border-secondary text-center text-muted" style="font-size: 0.7rem;">
            <p class="m-0 font-monospace">Default: admin / adminpassword (Admin role)</p>
            <p class="m-0 font-monospace">Default: analyst1 / analystpassword (Analyst role)</p>
        </div>
    </div>

    <!-- REGISTRATION PANEL (HIDDEN BY DEFAULT) -->
    <div id="register-container" class="card glass-panel p-4 w-100 d-none" style="max-width: 400px;">
        <div class="text-center mb-4">
            <i class="bi bi-person-plus text-info fs-1"></i>
            <h3 class="cyber-title font-cyber mt-2">CREATE IDENTITY</h3>
            <p class="text-muted small">Register new Security Analyst credentials</p>
        </div>

        <div id="register-error" class="alert alert-danger py-2 border-danger bg-opacity-10 text-danger d-none" role="alert" style="font-size: 0.85rem;">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> <span id="register-error-msg"></span>
        </div>

        <form id="register-form">
            <div class="mb-3">
                <label class="form-label text-muted small text-uppercase font-cyber">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-person"></i></span>
                    <input type="text" id="register-username" class="form-control form-cyber" placeholder="Enter username" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label text-muted small text-uppercase font-cyber">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-envelope"></i></span>
                    <input type="email" id="register-email" class="form-control form-cyber" placeholder="Enter email" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label text-muted small text-uppercase font-cyber">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-key"></i></span>
                    <input type="password" id="register-password" class="form-control form-cyber" placeholder="Min 6 characters" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label text-muted small text-uppercase font-cyber">System Role</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-person-badge"></i></span>
                    <select id="register-role" class="form-select form-cyber">
                        <option value="Security Analyst">Security Analyst</option>
                        <option value="Admin">Administrator</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-cyber-primary w-100 py-2 font-cyber mb-3">
                Register Analyst
            </button>
        </form>

        <div class="text-center mt-2">
            <span class="text-muted small">Already registered? </span>
            <a href="#" id="link-show-login" class="text-info small text-decoration-none">
                Login here
            </a>
        </div>
    </div>

    <!-- Auth Script bindings -->
    <script src="/static/js/auth.js"></script>
    <script>
        const loginContainer = document.getElementById('login-container');
        const registerContainer = document.getElementById('register-container');
        const showRegister = document.getElementById('link-show-register');
        const showLogin = document.getElementById('link-show-login');

        // Toggle interfaces
        showRegister.addEventListener('click', (e) => {
            e.preventDefault();
            loginContainer.classList.add('d-none');
            registerContainer.classList.remove('d-none');
        });

        showLogin.addEventListener('click', (e) => {
            e.preventDefault();
            registerContainer.classList.add('d-none');
            loginContainer.classList.remove('d-none');
        });

        // 1. Submit login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const errDiv = document.getElementById('login-error');
            const errMsg = document.getElementById('login-error-msg');

            errDiv.classList.add('d-none');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                if (res.ok) {
                    Auth.setToken(data.token);
                    window.location.href = '/';
                } else {
                    errDiv.classList.remove('d-none');
                    errMsg.innerText = data.message || 'Login failed';
                }
            } catch(e) {
                errDiv.classList.remove('d-none');
                errMsg.innerText = 'Network error connecting to Flask backend';
            }
        });

        // 2. Submit registration
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('register-username').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const role = document.getElementById('register-role').value;
            const errDiv = document.getElementById('register-error');
            const errMsg = document.getElementById('register-error-msg');

            errDiv.classList.add('d-none');

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, role })
                });
                
                const data = await res.json();
                if (res.ok) {
                    Auth.setToken(data.token);
                    window.location.href = '/';
                } else {
                    errDiv.classList.remove('d-none');
                    errMsg.innerText = data.message || 'Registration failed';
                }
            } catch(e) {
                errDiv.classList.remove('d-none');
                errMsg.innerText = 'Network error during registration';
            }
        });
    </script>
</body>
</html>
